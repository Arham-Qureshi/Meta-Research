{% extends "base.html" %}
{% block title %}Sign Up - Meta Research{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🚀</span>
            <h1 class="auth-title">Join MetaResearch</h1>
            <p class="auth-subtitle">Create an account to bookmark papers and build your library</p>
        </div>
        <form class="auth-form" id="signupForm">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="researchpro" required
                    minlength="3">
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Min 6 characters" required minlength="6">
                    <button type="button" class="password-toggle" id="passwordToggle"
                        aria-label="Show password">👁</button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            <div class="form-error" id="signupError" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
                <span class="btn-loader" style="display:none;"></span>
                Create Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Sign in</a></p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('signupBtn');
        const errorDiv = document.getElementById('signupError');
        const loader = btn.querySelector('.btn-loader');

        btn.disabled = true;
        loader.style.display = 'inline-block';
        errorDiv.style.display = 'none';

        try {
            const res = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = '/';
            } else {
                errorDiv.textContent = data.error;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    });

    // Password strength indicator
    document.getElementById('password').addEventListener('input', (e) => {
        const val = e.target.value;
        const strength = document.getElementById('passwordStrength');
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
        const colors = ['', '#ef4444', '#f59e0b', '#84cc16', '#22c55e', '#06b6d4'];

        if (val.length === 0) {
            strength.innerHTML = '';
        } else {
            strength.innerHTML = `<span style="color:${colors[score]}">● ${labels[score]}</span>`;
        }
    });

    document.getElementById('passwordToggle').addEventListener('click', () => {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    });
</script>
{% endblock %}
