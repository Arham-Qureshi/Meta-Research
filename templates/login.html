{% extends "base.html" %}
{% block title %}Login - Meta Research{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to access your bookmarks and research</p>
        </div>
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                        required>
                    <button type="button" class="password-toggle" id="passwordToggle"
                        aria-label="Show password">👁</button>
                </div>
            </div>
            <div class="form-error" id="loginError" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                <span class="btn-loader" style="display:none;"></span>
                Sign In
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('signup') }}" class="auth-link">Create one</a></p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');
        const loader = btn.querySelector('.btn-loader');

        btn.disabled = true;
        loader.style.display = 'inline-block';
        errorDiv.style.display = 'none';

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = '/';
            } else {
                errorDiv.textContent = data.error;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    });

    document.getElementById('passwordToggle').addEventListener('click', () => {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    });
</script>
{% endblock %}
